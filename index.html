<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Visualizations Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #73C8A9, #373B44);
            color: #333;
        }
        header {
            background-color: #282c34;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px;
        }
        .gallery img {
            margin: 10px;
            max-width: 300px;
            height: auto;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
        footer {
            text-align: center;
            margin: 20px;
            padding: 20px;
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>
    <header>
        <h1>Research Visualizations</h1>
        <nav>
            <a href="#research-focus">Research Focus</a> |
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <main>
        <section id="gallery">
            <h2>Visualizations Gallery</h2>
            <div class="gallery">
                <img src="path/to/your/gif1.gif" alt="Visualization 1">
                <img src="path/to/your/gif2.gif" alt="Visualization 2">
                <img src="path/to/your/gif3.gif" alt="Visualization 3">
                <!-- Add more GIFs here -->
            </div>
        </section>
        <section id="research-focus">
            <h2>Research Focus</h2>
            <p>Your research focus description goes here.</p>
            <!-- Add more details about your research focus -->
        </section>
    </main>
    <footer id="contact">
        <h2>Contact Information</h2>
        <p>Email: your.email@example.com</p>
        <p>Phone: (123) 456-7890</p>
    </footer>
</body>
</html>
